#
# docker-compose.yml for Hermes Agent
#
# Usage:
#   HERMES_UID=$(id -u) HERMES_GID=$(id -g) docker compose up -d
#
# Set HERMES_UID / HERMES_GID to the host user that owns ~/.hermes so
# files created inside the container stay readable/writable on the host.
# The entrypoint remaps the internal `hermes` user to these values via
# usermod/groupmod + gosu.
#
# Security notes:
#   - The dashboard service binds to 127.0.0.1 by default. It stores API
#     keys; exposing it on LAN without auth is unsafe. If you want remote
#     access, use an SSH tunnel or put it behind a reverse proxy that
#     adds authentication — do NOT pass --insecure --host 0.0.0.0.
#   - The gateway's API server is off unless you uncomment API_SERVER_KEY
#     and API_SERVER_HOST. See docs/user-guide/api-server.md before doing
#     this on an internet-facing host.
#
services:
  gateway:
    build: .
    image: hermes-agent:local
    #platform: linux/amd64
    container_name: hermes
    restart: unless-stopped
    networks:
      - hermes_net
    volumes:
      - ~/.hermes:/opt/data
    ports:
      # 让容器内 Agent 启动的网页服务可从宿主机访问
      - "3003:3003"
    expose:
      - "8642"
    environment:
      - HERMES_UID=${HERMES_UID:-10000}
      - HERMES_GID=${HERMES_GID:-10000}
      # API server for inter-container calls (OpenAI-compatible)
      # Other containers on this compose network can call:
      #   http://gateway:8642/v1/chat/completions
      - API_SERVER_HOST=0.0.0.0
      - API_SERVER_PORT=8642
      - API_SERVER_KEY=${API_SERVER_KEY:-change-me}
      - API_SERVER_MAX_REQUEST_BYTES=52428800  # 50MB，根据需要调整
    command: ["gateway", "run"]

  #Author：hpfu
  #dashboard需要访问gateway，所以必须在同一网络下；如果不需要dashboard，可以注释掉这个服务
  #networks：与gateway服务需在同一个网络下，才能访问gateway提供的API

  dashboard:
    build: .
    image: hermes-agent:local
    #platform: linux/amd64
    container_name: hermes-dashboard
    restart: unless-stopped
    networks:
      - hermes_net
    ports:
      - "9119:9119"
    depends_on:
      - gateway
    volumes:
      - ~/.hermes:/opt/data
    environment:
      - HERMES_UID=${HERMES_UID:-10000}
      - HERMES_GID=${HERMES_GID:-10000}
      - HERMES_TUI_DIR=/opt/hermes/ui-tui
    command: ["dashboard", "--host", "0.0.0.0", "--insecure", "--no-open", "--tui"]

networks:
  hermes_net:
    driver: bridge
