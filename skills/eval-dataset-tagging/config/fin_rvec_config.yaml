# 金融 RVEC 综合打标配置
# 模式：fin_rvec（一次性完成 F场景 + T任务 + RVEC标签 + P等级 + 评分）
mode: fin_rvec
output_format: jsonl
retry_limit: 3

# ══════════════════════════════════════════════════
# F 轴：金融业务场景（可多选，主+次）
# ══════════════════════════════════════════════════
fin_scene_schema:
  - code: "F01"
    name: "泛金融基础、宏观金融与金融体系"
    description: "不指向具体产品、账户、交易对象的金融基础、宏观金融和金融体系问题"
    examples: "金融机构、金融市场结构、央行、货币政策、利率、通胀、汇率、金融危机、金融监管框架、金融职业资格/考试体系本身"
  - code: "F02"
    name: "银行账户、存款、借记卡与支付结算"
    description: "银行账户、存款、借记卡/储蓄卡、转账、支付、清算和账户安全"
    examples: "储蓄卡冻结、账户异常、存款、转账失败、支付失败、手续费、电子钱包、第三方支付"
  - code: "F03"
    name: "信贷、信用卡、融资、担保与征信"
    description: "借贷、授信、信用卡、融资、还款、担保和征信"
    examples: "房贷、车贷、消费贷、经营贷、信用卡额度、信用卡冻结、分期、逾期、提前还款、征信报告"
  - code: "F04"
    name: "资本市场、证券、债券、衍生品与交易"
    description: "底层可交易金融工具、证券市场、交易机制和市场基础设施"
    examples: "股票、债券、期货、期权、外汇、商品、贵金属、指数、券商、交易所、IPO"
  - code: "F05"
    name: "投资产品、资产管理与财富管理"
    description: "产品化、集合化的投资产品，资管服务，组合管理和财富管理"
    examples: "公募基金、私募基金、ETF、银行理财、信托、资管计划、FOF、投顾、财富管理"
  - code: "F06"
    name: "保险、再保险、养老金与精算"
    description: "保险、再保险、商业养老金、年金、精算、投保、核保和理赔"
    examples: "寿险、健康险、重疾险、车险、财险、再保险、理赔、年金、企业年金"
  - code: "F07"
    name: "公司金融、财报、会计、审计、税务与企业资本运作"
    description: "企业财务、财报、会计、审计、税务、估值、并购和企业投融资"
    examples: "三张表、财务指标、审计、内控、税务申报、企业估值、并购、项目融资"
  - code: "F08"
    name: "金融风险、监管合规、反欺诈与金融犯罪防控"
    description: "金融风险管理、合规监管、消费者保护、反洗钱、反欺诈、反诈和金融违法犯罪防控"
    examples: "AML、KYC、风控策略、合规审查、适当性、消费者保护、套现、洗钱、骗贷"
  - code: "F09"
    name: "金融信息、资讯舆情、研报与评级"
    description: "金融信息内容、新闻、研报、舆情、评级和信息服务"
    examples: "金融新闻情绪、财经资讯分类、研报摘要、评级报告、信用评级、舆情监测"
  - code: "F10"
    name: "金融数据、量化、模型与金融工程工具"
    description: "金融数据处理、量化策略、建模、回测、定价、风控模型和工具实现"
    examples: "行情数据、因子模型、回测、组合优化、风险模型、定价模型"
  - code: "F11"
    name: "金融科技、数字金融与数字资产"
    description: "金融科技基础设施、数字金融业务、区块链金融和数字资产"
    examples: "开放银行、智能投顾、数字人民币、CBDC、区块链金融、加密资产"
  - code: "F12"
    name: "个人/家庭综合财务规划"
    description: "个人或家庭围绕多个财务目标、多个产品模块和较长生命周期进行整体资金规划"
    examples: "家庭资产负债、预算、应急金、教育金、养老、退休、财富传承"
  - code: "F99"
    name: "其他/无法判断金融场景"
    description: "金融相关但无法归入上述场景，或上下文缺失到无法判断"

# ══════════════════════════════════════════════════
# T 轴：任务类型（可多选，主+次）
# ══════════════════════════════════════════════════
task_type_schema:
  - code: "T00"
    name: "对话管理、约束设定与上下文控制"
    description: "用户主要是在设定角色、格式、范围、继续、修正、补充上下文"
  - code: "T01"
    name: "概念解释与金融教学"
    description: "解释金融术语、机制、原理、基础知识、学习型问题"
  - code: "T02"
    name: "事实、数据、规则查询与核验"
    description: "查询或核验客观事实、数据、政策、规则、费率、条款"
  - code: "T03"
    name: "材料理解、摘要、抽取、归纳与分类"
    description: "对用户提供的文本、表格、公告、研报等做摘要、抽取、分类"
  - code: "T04"
    name: "计算、测算、公式推导与校验"
    description: "进行数值计算、金融测算、公式推导"
  - code: "T05"
    name: "比较、筛选、排序与归类"
    description: "对多个对象、方案、产品进行比较、筛选、排序"
  - code: "T06"
    name: "分析、诊断、归因与影响解读"
    description: "对公司、市场、产品等进行原因分析、影响解读"
  - code: "T07"
    name: "估值、定价、模型设计与参数设定"
    description: "构建或使用估值、定价、风险等专业模型"
  - code: "T08"
    name: "预测、情景推演、压力测试与回测"
    description: "对未来结果、市场情景进行预测、推演、回测"
  - code: "T09"
    name: "决策支持与方案设计"
    description: "提供判断框架、方案设计、利弊权衡，帮助用户自主判断"
  - code: "T10"
    name: "个性化推荐、交易决策与销售导购"
    description: "要求给出具体产品/标的/交易/配置结论、推荐、买卖建议"
  - code: "T11"
    name: "流程办理、客服处置、投诉与争议解决"
    description: "处理账户、支付、贷款、理赔、投诉等流程问题"
  - code: "T12"
    name: "合规审查、风险识别与反诈防范"
    description: "审查合规性、识别风险、判断诈骗、检查是否违规"
  - code: "T13"
    name: "内容生成、改写、汇报与沟通表达"
    description: "生成、改写、润色邮件、报告、PPT、话术等"
  - code: "T14"
    name: "数据处理、代码实现与工具构建"
    description: "用Python、SQL、Excel等处理金融数据或实现模型"
  - code: "T15"
    name: "违法违规、欺诈、灰产与绕风控请求"
    description: "要求实施、优化、掩盖金融违法违规、欺诈、洗钱等"
  - code: "T16"
    name: "题目作答、考试辅导与案例解析"
    description: "金融考试题作答、选项判断、解析、讲解解题思路"
  - code: "T99"
    name: "其他/无法判断任务"
    description: "用户任务不完整、上下文缺失或无法判断具体动作"

