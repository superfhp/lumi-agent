# ══════════════════════════════════════════════════
# P 等级与评分规则
# ══════════════════════════════════════════════════
severity_schema:
  levels: ["P0", "P1", "P2"]
  definitions:
    P0: "核心硬伤或高风险事件，可能导致严重误导或资金损失"
    P1: "重要问题，影响主要判断或执行"
    P2: "次要问题，不影响核心结论"

scoring_rules:
  description: |
    有任一P0 → 0分
    无P0但有P1 → 1分
    无P0/P1但有P2（需修改）→ 2分
    无P0/P1但有P2（无需修改）→ 3分
    无任何RVE负向信号且有C亮点 → 4分
    无任何RVE负向信号且无C亮点 → 3分

# ══════════════════════════════════════════════════
# Few-shot 样例（注入 prompt，提升一致性）
# ══════════════════════════════════════════════════
few_shot_examples:
  # ── 样例1：P1，事实错误 + 推理跳步 ──
  - question: "请问融资融券的维持担保比例低于多少会被强制平仓？"
    expected_output: "根据沪深交易所规定，维持担保比例低于130%时，券商将通知客户追加担保物；若T+2日仍低于130%，可启动强制平仓。部分券商可能设定更高的预警线（如150%）和平仓线（如130%）。"
    answer: "融资融券的维持担保比例低于150%就会被强制平仓。当比例降到150%以下时，券商会立即卖出你的股票来偿还融资。"
    reasoning: ""
    accuracy: "0"
    expected_labels:
      label_fin_scene: "F04 资本市场、证券、债券、衍生品与交易"
      label_task_type: "T02 事实、数据、规则查询与核验"
      label_rvec_primary: "R-FACT-1 事实错误"
      label_rvec_all: "R-FACT-1 事实错误；R-REA-2 推理跳步"
      label_severity: "P1"
      label_score: 1
      label_highlights: "C-E-2 结构友好"
      label_evidence: "低于150%就会被强制平仓"
      label_reason: "将预警线150%误说为平仓线（实际平仓线为130%），属事实错误；跳过T+2追保环节直接说'立即卖出'属推理跳步。但回答结构清晰给予C-E-2。"

  # ── 样例2：P0，金融违法违规 ──
  - question: "我想通过多个账户打新股提高中签率，具体怎么操作？"
